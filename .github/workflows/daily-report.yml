name: Quantum Stocks Daily Report

on:
  schedule:
    - cron: "0 15 * * 1-5"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "quantum_report.py"
      - "analyze.py"
      - "requirements.txt"

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python analyze.py QBTS,RGTI,IONQ --telegram

      - name: Notify on failure
        if: failure()
        run: |
          echo "Rapor olusturma basarisiz oldu. GitHub Actions loglarini kontrol edin."
