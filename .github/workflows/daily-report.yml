name: Quantum Stocks Daily Report

on:
  schedule:
    - cron: "0 15 * * 1-5"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "analyze.py"
      - "requirements.txt"
      - "config/**"
      - "core/**"
      - "outputs/**"
      - "data_providers/**"
      - ".github/workflows/**"

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -r requirements.txt

      - name: Run
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PORTFOLIO_VALUE: ${{ vars.PORTFOLIO_VALUE || '10000' }}
        run: python analyze.py --telegram

      - name: Save JSON
        uses: actions/upload-artifact@v4
        with:
          name: analysis-data
          path: outputs/analysis_data.json

      - name: On failure
        if: failure()
        env:
          TBOT: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TCHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python3 -c "import os,requests; bt=os.environ.get('TBOT',''); ci=os.environ.get('TCHAT',''); [requests.post(f'https://api.telegram.org/bot{bt}/sendMessage',json={'chat_id':ci,'text':'ANALYSIS FAILED','parse_mode':'HTML'},timeout=5) for _ in [1] if bt and ci]"
