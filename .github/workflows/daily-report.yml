name: Quantum Stocks Daily Report

on:
  schedule:
    - cron: "0 15 * * 1-5"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "analyze.py"
      - "requirements.txt"
      - "config/**"
      - "core/**"
      - "outputs/**"
      - "data_providers/**"
      - ".github/workflows/daily-report.yml"

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run analysis
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PORTFOLIO_VALUE: ${{ vars.PORTFOLIO_VALUE || '10000' }}
        run: python analyze.py --telegram

      - name: Verify JSON output
        run: |
          if [ -f outputs/analysis_data.json ]; then
            echo "JSON raporu olusturuldu ✓"
            echo "| Symbol | Score | Regime |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|--------|" >> $GITHUB_STEP_SUMMARY
            python3 -c "
import json
with open('outputs/analysis_data.json') as f:
    data = json.load(f)
for sym, doc in data.get('symbols', {}).items():
    risk = doc.get('risk', {})
    print(f'| {sym} | {risk.get(\"composite_score\", \"?\")}/100 | {risk.get(\"regime_label\", \"?\")} |')
" >> $GITHUB_STEP_SUMMARY
          else:
            echo "UYARI: JSON output bulunamadi"

      - name: Upload JSON artifact
        uses: actions/upload-artifact@v4
        with:
          name: analysis-data
          path: outputs/analysis_data.json
          retention-days: 7

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "Rapor olusturma basarisiz. GitHub Actions loglarini kontrol edin."
          python3 -c "
import requests, os
bt = os.environ.get('TELEGRAM_BOT_TOKEN')
ci = os.environ.get('TELEGRAM_CHAT_ID')
if bt and ci:
    requests.post(f'https://api.telegram.org/bot{bt}/sendMessage',
        json={'chat_id': ci, 'text': '🚨 Sistem Hatasi / Rapor Iptal Edildi. Log: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}', 'parse_mode': 'HTML'},
        timeout=10)
"
